services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rules_resolution
      POSTGRES_USER: spine
      POSTGRES_PASSWORD: spine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spine -d rules_resolution"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - .env

volumes:
  pgdata:
